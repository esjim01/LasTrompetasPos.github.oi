<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Digital — Las Trompetas</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Tailwind CSS v4 -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Outfit', sans-serif;
            --color-brand: #6366f1;
        }

        @layer utilities {
            .glass {
                @apply bg-white/90 backdrop-blur-md border-b border-slate-200/50;
            }
        }

        body {
            @apply bg-slate-50 text-slate-900 antialiased selection:bg-brand selection:text-white;
        }

        /* Hide scrollbar for category list */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .product-card {
            @apply bg-white rounded-[2rem] overflow-hidden transition-all duration-500 border border-slate-100 flex flex-col h-full relative;
        }
        .product-card:hover {
            @apply -translate-y-2 shadow-2xl shadow-indigo-500/10 border-indigo-100;
        }

        .category-pill {
            @apply whitespace-nowrap px-6 py-2.5 rounded-full text-sm font-bold transition-all duration-300 border;
        }
        .category-pill.active {
            @apply bg-indigo-600 border-indigo-600 text-white shadow-lg shadow-indigo-200;
        }
        .category-pill.inactive {
            @apply bg-white border-slate-200 text-slate-500 hover:border-indigo-300 hover:text-indigo-600;
        }

        .stock-badge {
            @apply absolute top-4 right-4 px-3 py-1.5 rounded-xl text-[10px] font-extrabold tracking-wider uppercase backdrop-blur-md z-10;
        }
    </style>
</head>

<body>

    <!-- Header Section -->
    <header class="sticky top-0 z-50 glass">
        <div class="max-w-7xl mx-auto px-4 py-3 md:py-0 md:h-20 flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <div>
                    <h1 class="text-lg sm:text-xl font-extrabold tracking-tight leading-none text-slate-900">Las Trompetas</h1>
                    <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest mt-1">Menú Digital</p>
                </div>
            </div>

            <div class="hidden md:flex relative group">
                <i
                    class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors">search</i>
                <input type="text" id="busqueda" oninput="filtrarProductos()" placeholder="¿Qué estás buscando?"
                    class="pl-10 pr-4 py-2 bg-slate-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-indigo-500/20 w-64 transition-all">
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-5 md:py-6 space-y-6 md:space-y-8">

        <!-- Welcome Banner -->
        <section
            class="relative min-h-[360px] sm:min-h-[400px] md:h-80 rounded-[2rem] md:rounded-[2.5rem] overflow-hidden flex items-center px-4 sm:px-8 md:px-16 py-8 text-white shadow-2xl">
            <div class="absolute inset-0 bg-slate-900">
                <div class="absolute inset-0 bg-gradient-to-r from-black/80 via-black/40 to-transparent z-10"></div>
                <img src="https://images.unsplash.com/photo-1566737236500-c8ac43014a67?auto=format&fit=crop&q=80&w=1200"
                    class="w-full h-full object-cover opacity-70" alt="Viejoteca">
            </div>
            <div class="relative z-20 flex flex-col md:flex-row items-center gap-4 md:gap-10 w-full">
                <div class="flex-shrink-0 w-20 h-20 sm:w-24 sm:h-24 md:w-32 md:h-32 bg-white rounded-3xl p-2 shadow-2xl border border-white/20 overflow-hidden flex items-center justify-center">
                    <img src="/public/img/Las_trompetas.jpg" class="w-full h-full object-contain" alt="Logo">
                </div>
                <div class="space-y-1 text-center md:text-left">
                    <span class="inline-block px-3 py-1 bg-amber-500 rounded-lg text-[10px] font-bold uppercase tracking-widest mb-1 shadow-sm">Catálogo de Precios</span>
                    <h2 class="text-2xl sm:text-3xl md:text-6xl font-extrabold tracking-tighter leading-tight drop-shadow-md">Viejoteca <br class="hidden md:block"> La Trompetas</h2>
                    <p class="text-xs sm:text-sm md:text-lg font-medium opacity-90 drop-shadow-sm max-w-xl">El mejor lugar para la rumba en la calle del tango.</p>
                </div>
            </div>
        </section>

        <!-- Search Bar (Mobile Only) -->
        <div class="md:hidden">
            <div class="relative">
                <i class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</i>
                <input type="text" id="busqueda-mobile" oninput="filtrarProductos()" placeholder="Buscar en el menú..."
                    class="w-full pl-12 pr-4 py-4 bg-white rounded-3xl shadow-sm border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-500/20 outline-none">
            </div>
        </div>

        <!-- Categories Slider -->
        <section class="sticky top-[76px] md:top-20 z-40 py-2 glass -mx-4 px-4">
            <div id="categorias-list" class="flex gap-3 overflow-x-auto no-scrollbar py-2">
                <button class="category-pill active" onclick="filtrarCategoria('Todas', this)">Todas</button>
                <!-- Categorías dinámicas -->
            </div>
        </section>

        <!-- Products Grid -->
        <section>
            <div id="grid-productos"
                class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6 lg:gap-8">
                <!-- Los productos se cargan aquí -->
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="py-10 md:py-16 text-center space-y-6">
        <div class="flex justify-center gap-6">
            <a href="#"
                class="w-10 h-10 rounded-2xl bg-white shadow-sm flex items-center justify-center text-slate-400 hover:text-indigo-600 transition-all"><i
                    class="material-icons text-[20px]">share</i></a>
            <a href="#"
                class="w-10 h-10 rounded-2xl bg-white shadow-sm flex items-center justify-center text-slate-400 hover:text-indigo-600 transition-all"><i
                    class="material-icons text-[20px]">map</i></a>
        </div>
        <div class="space-y-1">
            <p class="text-xs font-extrabold text-slate-900 tracking-wider">LAS TROMPETAS</p>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Bienvenidos</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/catalogo.js"></script>
</body>

</html>
