<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Punto de Venta - Las Trompetas</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    
    <!-- Tailwind CSS v4 via CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --color-brand-50: #eff6ff;
            --color-brand-100: #dbeafe;
            --color-brand-500: #3b82f6;
            --color-brand-600: #2563eb;
            --color-brand-800: #1e40af;
            --color-brand-900: #0f172a;
            --color-bg: #f8fafc;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-bg);
            color: #334155;
        }

        /* Custom Scrollbar for categories */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Glassmorphism utility */
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Custom Toast */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .custom-toast {
            min-width: 250px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .custom-toast.show { transform: translateX(0); }
        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }
        .toast-warning { background: #f59e0b; }
        
        /* Modal Transitions */
        #modal-pedido {
            transition: transform 0.3s ease-out;
            transform: translateY(100%);
        }
        #modal-pedido.open {
            transform: translateY(0);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden antialiased relative">

    <!-- Navbar -->
    <nav class="bg-slate-900 text-white shadow-lg z-20 flex-shrink-0">
        <div class="max-w-[1600px] mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/20">
                    <i class="material-icons">point_of_sale</i>
                </div>
                <div>
                    <h1 class="font-extrabold tracking-tight text-lg leading-tight hidden sm:block">Las Trompetas - Ventas</h1>
                    <h1 class="font-extrabold tracking-tight text-lg leading-tight sm:hidden">Ventas</h1>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <a href="/public/dashboard.html" id="btn-admin" style="display: none" class="hidden sm:flex items-center gap-1.5 px-4 py-2 bg-rose-600 hover:bg-rose-700 rounded-lg text-sm font-bold transition-colors">
                    <i class="material-icons text-[18px]">inventory</i> Dashboard
                </a>
                <a href="/public/catalogo.html" target="_blank" class="flex items-center gap-1.5 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-sm font-bold transition-colors">
                    <i class="material-icons text-[18px]">qr_code_2</i> Menú QR
                </a>
                
                <button onclick="cerrarSesion()" class="text-slate-300 hover:text-white hover:bg-slate-800 p-2 rounded-full transition-colors relative group">
                    <i class="material-icons">logout</i>
                    <span class="absolute top-12 right-0 bg-slate-800 text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">Salir</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden max-w-[1600px] w-full mx-auto relative">
        
        <!-- Sidebar Categorias (Desktop) -->
        <aside class="hidden lg:block w-64 bg-white border-r border-slate-200 overflow-y-auto flex-shrink-0 flex flex-col">
            <div class="p-5 border-b border-slate-100">
                <h3 class="font-bold text-slate-800 flex items-center gap-2">
                    <i class="material-icons text-brand-600">category</i> Categorías
                </h3>
            </div>
            <div id="menu-categorias" class="p-3 space-y-1">
                <!-- Injected via JS -->
            </div>
        </aside>

        <!-- Right Side: Catalog -->
        <section class="flex-1 flex flex-col h-full bg-slate-50/50 min-w-0">
            
            <!-- Mobile Categories (Horizontal Scroll) -->
            <div class="lg:hidden bg-white border-b border-slate-200 px-4 py-3 flex-shrink-0 flex items-center min-w-0 w-full">
                <i class="material-icons text-brand-600 mr-2 flex-shrink-0">category</i>
                <div id="menu-categorias-movil" class="flex gap-2 overflow-x-auto hide-scrollbar pb-1 flex-1 items-center min-w-0 w-full">
                    <!-- Injected via JS -->
                </div>
            </div>

            <!-- Search Bar -->
            <div class="p-4 sm:p-6 flex-shrink-0">
                <div class="relative max-w-2xl mx-auto shadow-sm group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="material-icons text-slate-400 group-focus-within:text-brand-600 transition-colors">search</i>
                    </div>
                    <input type="text" id="busqueda-venta" placeholder="Buscar producto (ej: Cerveza...)" onkeyup="buscarProductoVenta()" class="w-full bg-white border border-slate-200 text-slate-900 text-sm rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 block !pl-12 p-3.5 transition-all outline-none">
                </div>
            </div>

            <!-- Product Grid -->
            <div class="flex-1 overflow-y-auto px-4 sm:px-6 pb-24">
                <div id="catalogo-productos" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4">
                    <!-- Injected via JS -->
                </div>
            </div>

        </section>
    </main>

    <!-- Floating Action Button (Cart) -->
    <button onclick="toggleModal()" class="fixed bottom-6 right-6 w-16 h-16 bg-brand-600 hover:bg-brand-700 text-white rounded-full shadow-[0_8px_30px_rgb(37,99,235,0.4)] flex items-center justify-center transition-transform hover:scale-105 z-30 group">
        <i class="material-icons text-3xl">shopping_cart</i>
        <span id="badge-cart" class="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-bold w-6 h-6 flex items-center justify-center rounded-full border-2 border-white shadow-sm">0</span>
    </button>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden transition-opacity opacity-0" onclick="toggleModal()"></div>

    <!-- Bottom Sheet Modal (Cart) -->
    <div id="modal-pedido" class="fixed bottom-0 inset-x-0 bg-white rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-50 max-h-[85vh] flex flex-col max-w-3xl mx-auto border border-slate-100">
        
        <!-- Header -->
        <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between flex-shrink-0">
            <h5 class="text-xl font-extrabold text-slate-900 flex items-center gap-2">
                <i class="material-icons text-brand-600">receipt_long</i> Resumen del Pedido
            </h5>
            <button onclick="toggleModal()" class="text-slate-400 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 p-2 rounded-full transition-colors">
                <i class="material-icons">close</i>
            </button>
        </div>

        <!-- Cart Items -->
        <div class="flex-1 overflow-y-auto p-4 sm:p-6" id="lista-carrito-container">
            <ul id="lista-carrito" class="space-y-3">
                <!-- Injected via JS -->
            </ul>
        </div>

        <!-- Footer / Checkout -->
        <div class="p-6 bg-slate-50 border-t border-slate-200 rounded-t-3xl flex-shrink-0 space-y-5">
            
            <!-- Total -->
            <div class="flex items-center justify-between bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <span class="text-sm font-bold text-slate-500 uppercase tracking-wider">Total a Pagar</span>
                <span class="text-3xl font-black text-brand-600" id="total-venta">$0</span>
            </div>

            <!-- Personas Switch -->
            <div class="flex flex-col sm:flex-row sm:items-center gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <label class="flex items-center cursor-pointer relative">
                    <input type="checkbox" id="check-personas" onchange="togglePersonas()" class="sr-only peer">
                    <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brand-500"></div>
                    <span class="ml-3 text-sm font-bold text-slate-700">Registrar Personas</span>
                </label>

                <div id="contenedor-personas" class="hidden sm:ml-auto items-center gap-2">
                    <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl overflow-hidden px-3 py-1">
                        <i class="material-icons text-slate-400 text-sm mr-2">groups</i>
                        <input type="number" id="num-personas" value="1" min="1" class="w-16 bg-transparent text-slate-900 font-bold outline-none text-center">
                    </div>
                </div>
            </div>

            <!-- Cobrar Btn -->
            <button onclick="confirmarVenta()" class="w-full bg-slate-900 hover:bg-brand-600 text-white font-extrabold rounded-2xl text-lg py-4 transition-all shadow-lg shadow-brand-500/20 flex items-center justify-center gap-2">
                <span>COBRAR</span>
                <i class="material-icons">check_circle</i>
            </button>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script>
        // --- CUSTOM TOAST FUNCTION ---
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let typeClass = 'toast-warning';
            let icon = 'info';
            
            if (type === 'success') {
                typeClass = 'toast-success';
                icon = 'check_circle';
            } else if (type === 'error') {
                typeClass = 'toast-error';
                icon = 'error';
            }

            toast.className = `custom-toast ${typeClass}`;
            toast.innerHTML = `<i class="material-icons">${icon}</i> <span>${message}</span>`;
            
            container.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);
            
            // Remove after 3 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Overwrite Materialize Toast with ours
        window.M = window.M || {};
        window.M.AutoInit = function() {}; // Mock AutoInit to prevent errors
        window.M.toast = function(options) {
            let type = 'info';
            if (options.classes && options.classes.includes('green')) type = 'success';
            if (options.classes && options.classes.includes('red')) type = 'error';
            showToast(options.html, type);
        };

        // UI Logic
        function toggleModal() {
            const modal = document.getElementById('modal-pedido');
            const overlay = document.getElementById('modal-overlay');
            
            if (modal.classList.contains('open')) {
                modal.classList.remove('open');
                overlay.classList.add('hidden');
                setTimeout(() => { overlay.classList.remove('opacity-100'); overlay.classList.add('opacity-0'); }, 10);
            } else {
                modal.classList.add('open');
                overlay.classList.remove('hidden');
                setTimeout(() => { overlay.classList.remove('opacity-0'); overlay.classList.add('opacity-100'); }, 10);
            }
        }

        function togglePersonas() {
            const check = document.getElementById('check-personas');
            const cont = document.getElementById('contenedor-personas');
            if (check.checked) {
                cont.classList.remove('hidden');
                cont.classList.add('flex');
            } else {
                cont.classList.add('hidden');
                cont.classList.remove('flex');
            }
        }

        // Close modal on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('modal-pedido').classList.contains('open')) {
                toggleModal();
            }
        });

        // Initialize basic features
        document.addEventListener("DOMContentLoaded", function () {
            try {
                // Leer datos del usuario guardados por el index.html (Tailwind version)
                let userStr = localStorage.getItem("usuarioNombre") || localStorage.getItem("usuarioActual");
                if (userStr) {
                    const userData = JSON.parse(userStr);
                    const rolLimpio = (userData.rol || "").trim().toUpperCase();
                    
                    const btnAdmin = document.getElementById("btn-admin");
                    if (btnAdmin && (rolLimpio === "ADMIN" || rolLimpio === "ADMINISTRADOR" || rolLimpio === "JEFE")) {
                        btnAdmin.style.display = "flex";
                    }
                }
            } catch (e) {
                console.warn("Error leyendo usuario", e);
            }
        });
        
        // Mock M.Modal — maps to the custom panel toggle for modal-pedido
        M.Modal = {
            getInstance: function(el) {
                return {
                    open: function() {
                        if (el) el.classList.add('open');
                    },
                    close: function() {
                        if (el) el.classList.remove('open');
                    }
                };
            },
            init: function() {}
        };
    </script>
    <script src="/public/js/ventas.js"></script>
</body>
</html>
